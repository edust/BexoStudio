<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        if (params.get("overlay") === "screenshot") {
          document.documentElement.dataset.overlay = "screenshot";
        }
      })();
    </script>
    <style>
      html[data-overlay="screenshot"],
      html[data-overlay="screenshot"] body,
      html[data-overlay="screenshot"] #root,
      html[data-overlay="screenshot"] .ant-app {
        background: transparent !important;
      }
    </style>
    <title>Bexo Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
